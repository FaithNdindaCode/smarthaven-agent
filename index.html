<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smarthaven Agent - Product Research AI</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2.8rem;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #aaaaaa;
      margin-bottom: 40px;
    }
    .tabs {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 40px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }
    .tab {
      font-size: 1.1rem;
      cursor: pointer;
      padding: 10px 20px;
      color: #888;
      transition: all 0.3s;
    }
    .tab.active {
      color: #00ff9d;
      border-bottom: 3px solid #00ff9d;
      font-weight: 600;
    }
    .input-section {
      margin-bottom: 30px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 12px;
      color: white;
    }
    .analyze-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.2rem;
      font-weight: 600;
      background: #00ff9d;
      color: black;
      border: none;
      border-radius: 12px;
      margin-top: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .analyze-btn:hover {
      background: #00cc7a;
    }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }
    .suggestion {
      background: #1a1a1a;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion:hover {
      background: #333;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      display: none;
    }
    .results {
      background: #1a1a1a;
      padding: 25px;
      border-radius: 16px;
      display: none;
      margin-top: 30px;
    }
    .hourglass {
      font-size: 3rem;
      animation: spin 2s linear infinite;
      display: inline-block;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Research. Analyze.<br>Drop or Ship.</h1>
    <p class="subtitle">Your AI agent for finding winning dropshipping products</p>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-type="PRODUCT RESEARCH ANALYSIS">🔍 Research Product</div>
      <div class="tab" data-type="NICHE ANALYSIS REPORT">📊 Analyze Niche</div>
      <div class="tab" data-type="PRODUCT COMPARISON REPORT">⚖️ Compare Products</div>
    </div>

    <div class="input-section">
      <label>PRODUCT OR URL TO RESEARCH</label>
      <input type="text" id="productInput" placeholder="e.g. 'LED desk lamp with wireless charging' or paste an AliExpress URL...">
      
      <button class="analyze-btn" id="analyzeBtn">
        ▶️ Analyze
      </button>
    </div>

    <!-- Suggestions -->
    <div class="suggestions">
      <div class="suggestion">Nail file kit</div>
      <div class="suggestion">LED strips</div>
      <div class="suggestion">Posture brace</div>
      <div class="suggestion">Mini projector</div>
      <div class="suggestion">Resistance bands</div>
      <div class="suggestion">Eco beauty</div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="hourglass">⌛</div>
      <h3>Analyzing...</h3>
      <p id="loadingText">Agent is researching your product...</p>
    </div>

    <!-- Results -->
    <div class="results" id="results">
      <h2 id="reportTitle"></h2>
      <div id="reportContent"></div>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const productInput = document.getElementById('productInput');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const reportTitle = document.getElementById('reportTitle');
    const reportContent = document.getElementById('reportContent');
    const loadingText = document.getElementById('loadingText');

    let currentReportType = "PRODUCT RESEARCH ANALYSIS";

    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentReportType = tab.dataset.type;
      });
    });

    // Suggestion chips
    document.querySelectorAll('.suggestion').forEach(suggestion => {
      suggestion.addEventListener('click', () => {
        productInput.value = suggestion.textContent.trim();
      });
    });

    // Main Analyze function
    analyzeBtn.addEventListener('click', async () => {
      const query = productInput.value.trim();
      
      if (!query) {
        alert("Please enter a product name or URL");
        return;
      }

      // Show loading, hide results
      loading.style.display = 'block';
      results.style.display = 'none';
      loadingText.textContent = `Agent is researching "${query}"...`;

      // Simulate AI thinking time (replace this later with real API call)
      await new Promise(resolve => setTimeout(resolve, 2200));

      // Fake realistic report (we'll connect real AI later)
      const fakeReport = generateFakeReport(query, currentReportType);

      // Display results
      loading.style.display = 'none';
      results.style.display = 'block';
      reportTitle.textContent = currentReportType.replace(/_/g, ' ');
      reportContent.innerHTML = fakeReport;
    });

    // Fake report generator - replace with real AI later
    function generateFakeReport(product, type) {
      if (type === "PRODUCT RESEARCH ANALYSIS") {
        return `
          <h3>✅ Recommendation: Strong Potential</h3>
          <p><strong>Demand Score:</strong> 8.7/10</p>
          <p><strong>Competition:</strong> Medium</p>
          <p><strong>Estimated Profit Margin:</strong> 45–65%</p>
          <p><strong>Best AliExpress Suppliers:</strong> 3 reliable options found</p>
          <hr>
          <h4>Why this product can sell:</h4>
          <ul>
            <li>Trending on TikTok and Instagram</li>
            <li>Low shipping weight (easy to fulfill)</li>
            <li>Good reviews on similar products</li>
          </ul>
          <p><strong>Next Step:</strong> Import via DSers and test with 5–10 units.</p>
        `;
      } else if (type === "NICHE ANALYSIS REPORT") {
        return `
          <h3>Niche Analysis for ${product}</h3>
          <p><strong>Niche Score:</strong> 9.1/10</p>
          <p><strong>Target Audience:</strong> Home office workers & students</p>
          <p><strong>Monthly Search Volume:</strong> ~45,000</p>
          <p><strong>Competition Level:</strong> Low-Medium</p>
        `;
      } else {
        return `
          <h3>Product Comparison</h3>
          <p>Comparison between 3 similar products on AliExpress...</p>
          <p><strong>Winner:</strong> Option B (best margin + reviews)</p>
        `;
      }
    }
  </script>
</body>
</html>
